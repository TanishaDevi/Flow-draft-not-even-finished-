<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_19 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_19" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_19');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const scene = new THREE.Scene();
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Core node
const coreGeo = new THREE.SphereGeometry(0.5, 32, 32);
const coreMat = new THREE.MeshPhongMaterial({ 
    color: 0x2e5bff, 
    emissive: 0x1a2e7a,
    shininess: 100 
});
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// Orbital nodes
const orbitGroup = new THREE.Group();
scene.add(orbitGroup);

const nodes = [
    { color: 0x00f2ff, distance: 2.5, size: 0.2, speed: 0.5 }, // Pulse
    { color: 0xff3d00, distance: 3.5, size: 0.25, speed: 0.3 }, // Incidents
    { color: 0xbcff00, distance: 4.5, size: 0.3, speed: 0.2 }, // Revenue
    { color: 0xffffff, distance: 5.5, size: 0.15, speed: 0.4 }  // Active
];

const orbitalMeshes = nodes.map(node => {
    const geo = new THREE.SphereGeometry(node.size, 16, 16);
    const mat = new THREE.MeshPhongMaterial({ color: node.color, emissive: node.color, emissiveIntensity: 0.5 });
    const mesh = new THREE.Mesh(geo, mat);
    
    // Add orbital ring
    const ringGeo = new THREE.TorusGeometry(node.distance, 0.01, 2, 64);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);
    
    orbitGroup.add(mesh);
    return { mesh, ...node, angle: Math.random() * Math.PI * 2 };
});

const light = new THREE.PointLight(0xffffff, 1.5, 100);
light.position.set(5, 5, 5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

camera.position.z = 8;

function animate() {
    requestAnimationFrame(animate);
    const time = Date.now() * 0.001;
    
    core.rotation.y += 0.01;
    core.scale.setScalar(1 + Math.sin(time * 2) * 0.05);
    
    orbitalMeshes.forEach(node => {
        node.angle += node.speed * 0.01;
        node.mesh.position.x = Math.cos(node.angle) * node.distance;
        node.mesh.position.z = Math.sin(node.angle) * node.distance;
        node.mesh.rotation.y += 0.02;
    });
    
    orbitGroup.rotation.x = Math.sin(time * 0.2) * 0.2;
    
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_19 -->
</body>
